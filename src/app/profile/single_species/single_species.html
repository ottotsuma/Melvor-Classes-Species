<template id="profile-single_species">
    <div class="col-12 col-sm-6 col-xl-3" :id="localId" @vue:mounted="mounted">
        <div class="block block-rounded-extra block-link-pop border-top border-profile border-4x h-100">
            <div class="block-content block-content-full d-flex flex-column align-items-center text-center h-100">

                <!-- Name + skill icons -->
                <div class="d-flex align-items-center justify-content-center flex-wrap pt-2 pb-1">
                    <h4 class="font-w700 mb-0 ml-1">{{ single_speciesName }}</h4>
                    <img class="skill-icon-xs m-1" v-for="skillIcon in getSkillIcons()" :src="skillIcon" />
                </div>

                <!-- Main image -->
                <div class="p-2 d-flex justify-content-center mb-auto">
                    <img class="single_species-img" style="max-height: 40vh; max-width: 20vw;" v-bind:src="media" />
                </div>

                <!-- Mastery bar -->
                <div class="w-100 px-2">
                    <mastery-display class="mastery-6" data-skill-id="namespace_profile:Profile"
                        v-bind:data-action-id="id">
                    </mastery-display>
                </div>

                <!-- Buttons -->
                <div class="d-flex flex-column align-items-center w-100 px-3 py-2">
                    <button class="btn btn-alt-success btn-block mb-2" @click="Master()" :disabled="disabled">
                        {{ disabled ? getLangString('Profile_Mastered') : getLangString('Profile_Equip') }}
                    </button>
                    <button class="btn btn-alt-info btn-block mb-2" @click="mastery()">
                        {{ getLangString('Profile_Mastery') }}
                    </button>
                    <!-- <button class="btn btn-alt-info ml-3 mr-3 mb-3 mt-1" @click="Explain()">
                        {{ getLangString('Profile_Explain') }}
                    </button> -->
                </div>

                <!-- XP icons -->
                <div class="d-flex justify-content-center flex-wrap icon-size-48 pb-2" id="grants-container">
                    <xp-icon id="profile-xp"></xp-icon>
                    <mastery-xp-icon id="profile-mastery-xp"></mastery-xp-icon>
                    <mastery-pool-icon id="profile-pool-xp"></mastery-pool-icon>
                </div>

            </div>
        </div>
    </div>
</template>
