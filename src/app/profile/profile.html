<template id="profile">
    <div class="content d-none" id="profile-container">

        <!-- Skill Header -->
        <div class="skill-info profile-skill-info">
            <skill-header data-skill-id="namespace_profile:Profile"></skill-header>
        </div>

        <!-- Equipped (You) -->
        <div class="row row-deck mb-3">
            <div class="col-12" id="you-container"></div>
        </div>

        <!-- Sections -->
        <div class="d-flex flex-column align-items-center w-100">

            <details class="w-100 mb-2">
                <summary class="profile-section-summary">Species</summary>
                <div class="row row-deck gutters-tiny mt-2" id="species-container"></div>
            </details>

            <details class="w-100 mb-2">
                <summary class="profile-section-summary">Classes</summary>
                <div class="row row-deck gutters-tiny mt-2" id="classes-container"></div>
            </details>

            <details class="w-100 mb-2">
                <summary class="profile-section-summary">Abyss Classes</summary>
                <div class="row row-deck gutters-tiny mt-2" id="abyss-classes-container"></div>
            </details>

            <!-- Guide -->
            <details class="w-100 mb-2">
                <summary class="profile-section-summary">Guide</summary>
                <div class="profile-guide p-3">

                    <div class="d-flex justify-content-center align-items-end mb-3">
                        <img class="m-2" src="https://cdn2-main.melvor.net/assets/media/skills/thieving/man.svg"
                            height="64px">
                        <h3 class="text-light mb-0">Profile</h3>
                    </div>

                    <p>Profile is a passive skill giving you the ability to pick both a class and a species to play as
                        in Melvor.</p>

                    <p>The intention was to give you a role to play as, but it seems people want to swap species
                        depending on the skill instead of having a mix of skills per species.</p>

                    <p>To unlock modifiers you will need GP and a Profile Token. These tokens have a small chance to
                        drop when gaining XP from any skill in the game. Just be sure to have a class and species
                        equipped.</p>

                    <p>Species have been assigned to not only every Melvor monster but also modded monsters from any of
                        my or KumaV1's mods. I have tried to add species to the monsters of popular other content mods.
                    </p>

                    <div class="profile-guide-img-container">
                        <img class="img-fluid m-2"
                            src="https://thumb.modcdn.io/mods/bceb/3619616/thumb_1020x2000/2024-01-241.png">
                    </div>

                    <p>At the top you can see which Class &amp; Species you have equipped right now along with the
                        active and inactive modifiers.</p>

                    <div class="profile-guide-img-container">
                        <img class="img-fluid m-2"
                            src="https://thumb.modcdn.io/mods/bceb/3619616/thumb_1020x2000/2024-01-241.3.png">
                    </div>

                    <p>Classes and Species lists are shown just below with the ability to switch between any you like
                        for free, until you unlock some modifiers, then things get costly.</p>

                    <div class="profile-guide-img-container">
                        <img class="img-fluid m-2"
                            src="https://thumb.modcdn.io/mods/bceb/3619616/thumb_1020x2000/2024-01-241.2.png">
                    </div>

                    <p>You must have at least a class or species equipped to gain XP in this skill. You can gain skill
                        XP and mastery by killing monsters in combat with classes / species equipped.</p>

                    <p>You can gain mastery XP for a species doing a non-combat skill if that species is marked with
                        that skill's tag. (That species/class must be equipped.) The image below shows an Elf that gains
                        mastery exp from fletching. [Angels can also gain mastery XP by burying bones.]</p>

                    <div class="profile-guide-img-container">
                        <img class="img-fluid m-2"
                            src="https://thumb.modcdn.io/mods/bceb/3619616/thumb_1020x2000/2024-01-241.1.png">
                    </div>

                    <h4 class="text-light mt-3">Modding</h4>
                    <p>You can create your own species and classes for this mod. Code for following along can be found
                        at: <a href="https://github.com/ottotsuma/Melvor-TES"
                            target="_blank">https://github.com/ottotsuma/Melvor-TES</a></p>

                    <p>Firstly, check the mod was loaded inside <code>onModsLoaded</code> or before:</p>
                    <pre
                        class="profile-code-block">const profileSkill = mod.manager.getLoadedModList().includes("(Skill) Classes and Species")</pre>

                    <p>You can then check for <code>profileSkill</code> and if it's loaded, load your JSON. In
                        <code>skills</code> you can provide either a Melvor skill ID or an image URL. If you use a
                        Melvor or modded skill, performing that skill will grant mastery XP for that species.</p>

                    <pre class="profile-code-block">"data": {
  "skillData": [{
    "skillID": "namespace_profile:Profile",
    "data": {
      "species": [{
        "id": "Human",
        "name": "Human",
        "media": "https://ottotsuma.github.io/images/portraits/human%20female%20barbarian%202.jpg",
        "baseExperience": 5,
        "level": 1,
        "skills": [
          "https://cdn2-main.melvor.net/assets/media/skills/thieving/man.svg",
          "melvorD:Crafting"
        ],
        "standardModifiers": [
          { "level": 0,  "key": "humanTraitApplied",              "value": 1  },
          { "level": 1,  "key": "decreasedMagicMaxHit",           "value": 10 },
          { "level": 20, "key": "increasedDamageAgainstAnimals",  "value": 10 },
          { "level": 40, "key": "increasedDamageAgainstHumans",   "value": 10 },
          { "level": 60, "key": "increasedGPFromSales",           "value": 10 },
          { "level": 80, "key": "increasedChanceForGoldFromCrafting30", "value": 10 },
          { "level": 99, "key": "decreasedGlobalSkillIntervalPercent",  "value": 5  }
        ]
      }]
    }
  }]
}</pre>

                    <h4 class="text-light mt-3">Thank you</h4>
                    <p>Thank you again for testing the skill.</p>

                </div>
            </details>

        </div>
    </div>
</template>
